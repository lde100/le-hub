services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www                          # Source live gemountet
      - /var/www/vendor                     # vendor vom Image behalten
      - build_cache:/var/www/public/build   # Vite-Build nicht überschreiben
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - le-hub

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - le-hub

  db:
    image: mariadb:11
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MARIADB_DATABASE: ${DB_DATABASE:-le_hub}
      MARIADB_USER: ${DB_USERNAME:-le_hub}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - le-hub

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  # Setup (einmalig):
  #   1. cloudflared tunnel login
  #   2. cloudflared tunnel create le-hub
  #   3. Token aus Dashboard kopieren → CLOUDFLARE_TUNNEL_TOKEN in .env
  #   4. docker compose --profile tunnel up -d
  #
  # Dann in Cloudflare Dashboard:
  #   Tunnel → le-hub → Public Hostname:
  #     deine-domain.de → http://nginx:80
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - le-hub
    profiles:
      - tunnel   # Nur starten wenn: docker compose --profile tunnel up -d

volumes:
  db_data:
  build_cache:

networks:
  le-hub:
    driver: bridge
